name: Release

on:
  push:
    branches:
      - master

jobs:
  node:
    runs-on: ubuntu-latest

    permissions:
      checks: write # lint-action creates check runs with annotations
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance

    steps:
      - uses: actions/checkout@v6

      - name: Reconfigure git to use HTTP authentication
        run: >
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      # No registry-url: it would write a placeholder-token .npmrc that breaks OIDC.
      # Trusted publishing authenticates via id-token; npmjs.org is the default registry.
      - name: node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: installing npm
        run: npm i -g npm@11

      - name: installing
        run: npm ci --audit false --fund false

      - name: linters
        uses: wearerequired/lint-action@v1
        with:
          eslint: true
          eslint_extensions: ts,tsx,js,jsx
          eslint_dir: src/
          prettier: true
          prettier_extensions: ts,tsx,js,jsx,json,md,mdx,css
          github_token: ${{ secrets.GITHUB_TOKEN }}
          continue_on_error: true
        continue-on-error: true

      - name: testing
        run: npm test -- --coverage

      - name: building
        run: npm run build

      - name: releasing
        run: npm run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # @master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
